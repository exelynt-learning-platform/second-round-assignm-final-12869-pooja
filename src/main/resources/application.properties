spring.application.name=ecommerce
# Spring Datasource
spring.datasource.url=jdbc:mysql://localhost:3307/ecommerce_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect


server.port=8082

security.jwt.secret=${JWT_SECRET:MySuperStrongSecretJWTSecretKey1234567890}
security.jwt.expiration=86400000



stripe.secret.key=${STRIPE_SECRET_KEY:sk_test_dummy_key}
